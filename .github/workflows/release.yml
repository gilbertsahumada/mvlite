name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (no v prefix, e.g. 0.1.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev libudev-dev clang

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Cache cargo registry + aptos-core target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .aptos-core/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.toml', 'build.sh') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build movelite
        run: bash build.sh

      - name: Smoke test
        run: ./target/movelite --help

      - uses: actions/upload-artifact@v4
        with:
          name: movelite-${{ matrix.target }}
          path: target/movelite
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version
        run: |
          version="${{ steps.version.outputs.value }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: $version" >&2
            exit 1
          fi

      - name: Publish packages
        run: bash scripts/publish-npm.sh "${{ steps.version.outputs.value }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
