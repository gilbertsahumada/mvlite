name: Build binaries

# Build the movelite binary on all 4 native runners and upload each as a
# downloadable artifact. Does NOT publish to npm. Use this to obtain the
# Linux / Intel-Mac binaries that can't be cross-compiled locally, then
# publish each platform package by hand (scripts/publish-platform.sh) to
# bootstrap the package names. After the names exist + have Trusted
# Publishers, the Release workflow handles subsequent releases tokenlessly.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev libudev-dev clang

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Cache cargo registry + aptos-core target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .aptos-core/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.toml', 'build.sh') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build movelite
        run: bash build.sh

      - name: Smoke test
        run: ./target/movelite --help

      - uses: actions/upload-artifact@v4
        with:
          name: movelite-${{ matrix.target }}
          path: target/movelite
          if-no-files-found: error
